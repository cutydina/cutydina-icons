<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutydina Icons Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-light: #f8f9fa;
        }
        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .icon-card {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: white;
        }
        .icon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border-color: var(--primary-color);
        }
        .cd-icon {
            width: 40px;
            height: 40px;
            fill: #333;
            transition: fill 0.2s;
        }
        .icon-card:hover .cd-icon {
            fill: var(--primary-color);
        }
        .icon-name {
            font-size: 0.75rem;
            color: #6c757d;
            font-weight: 500;
        }
        #iconSearch {
            border-radius: 30px;
            padding-left: 20px;
            border: 2px solid #eee;
        }
        #iconSearch:focus {
            border-color: var(--primary-color);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="display-4 fw-bold">Cutydina Icons</h1>
        <p class="text-muted">Librería de iconos personalizados para proyectos web y Godot</p>
    </header>

    <div class="row justify-content-center mb-5">
        <div class="col-md-6">
            <input type="text" id="iconSearch" class="form-control form-control-lg" placeholder="Buscar icono por nombre...">
        </div>
    </div>

    <div id="iconGrid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 g-4">
        </div>
</div>

<script>
    // Lista de IDs basada en tu archivo sprites.svg
    const icons = [
        'icon-arrowleft', 'icon-buymeacofee', 'icon-calendar', 'icon-copyright', 
        'icon-danger', 'icon-gift', 'icon-heart', 'icon-heartsmile', 'icon-search',
        'social-amazon', 'social-bluesky', 'social-buymeacoffee', 'social-cara',
        'social-codepen', 'social-discord', 'social-email', 'social-github',
        'social-googleplay', 'social-linkedin', 'social-patreon', 'social-paypal',
        'social-pinterest', 'social-reddit', 'social-telegram', 'social-tiktok',
        'social-vgen', 'social-webtoon', 'social-youtube'
    ];

    const grid = document.getElementById('iconGrid');
    const search = document.getElementById('iconSearch');

    // Función para mostrar los iconos
    function displayIcons(filter = '') {
        grid.innerHTML = '';
        
        const filteredIcons = icons.filter(id => id.toLowerCase().includes(filter.toLowerCase()));

        filteredIcons.forEach(id => {
            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = `
                <div class="icon-card p-3 text-center h-100" onclick="copyToClipboard('${id}')">
                    <svg class="cd-icon mb-2">
                        <use href="sprites.svg#${id}"></use>
                    </svg>
                    <div class="icon-name text-truncate" title="${id}">${id}</div>
                </div>
            `;
            grid.appendChild(col);
        });
    }

    // Función extra: Copiar ID al hacer clic
    function copyToClipboard(id) {
        navigator.clipboard.writeText(id);
        alert('ID copiado: ' + id);
    }

    // Evento de búsqueda
    search.addEventListener('input', (e) => displayIcons(e.target.value));

    // Carga inicial
    displayIcons();
</script>

<footer class="py-4 text-center text-muted">
    <small>&copy; 2026 Cutydina Icons Library</small>
</footer>

</body>
</html>
