<header class="py-5 text-center bg-light border-bottom">
    <div class="container">
        <h1 class="fw-bold">CutyDina Icons</h1>
        <p class="text-muted">Librería personal de iconos optimizados.</p>
        <div class="row justify-content-center mt-4">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Buscar iconos...">
            </div>
        </div>
    </div>
</header>

<main class="container my-5">
    <div id="iconGrid" class="row g-4">
        </div>
</main>

<div id="copyToast" class="toast-container position-fixed bottom-0 end-0 p-3">
    <div class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">¡Copiado al portapapeles!</div>
        </div>
    </div>
</div>

<script>
    // Lista de IDs (Asegúrate de incluir todos los nombres aquí)
    const icons = [
        'icon-arrowleft', 'icon-buymeacofee', 'icon-calendar', 'icon-copyright', 
        'icon-danger', 'icon-gift', 'icon-heart', 'icon-heartsmile', 'icon-search',
        'social-amazon', 'social-bluesky', 'social-cara', 'social-discord', 
        'social-github', 'social-youtube' 
    ];

    const grid = document.getElementById('iconGrid');
    const search = document.getElementById('searchInput');

    function render(filter = '') {
        grid.innerHTML = '';
        icons.filter(i => i.includes(filter.toLowerCase())).forEach(id => {
            const shortName = id.replace('icon-', '').replace('social-', '');
            grid.innerHTML += `
                <div class="col-6 col-sm-4 col-md-3 col-lg-2">
                    <div class="icon-card text-center p-4 border rounded" onclick="copySnippet('${id}')">
                        <svg class="cd-icon mb-2"><use href="#${id}"></use></svg>
                        <div class="icon-name text-muted small text-truncate">${shortName}</div>
                    </div>
                </div>
            `;
        });
    }

    function copySnippet(id) {
        const text = `<svg class="cd-icon"><use href="#${id}"></use></svg>`;
        navigator.clipboard.writeText(text);
        const toastEl = document.querySelector('.toast');
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
    }

    search.addEventListener('input', (e) => render(e.target.value));
    render();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
