<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutydina Icons Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5 p-4 rounded-3">
        <h1 class="display-4 fw-bold">Cutydina Icons</h1>
        <p class="text-muted">Librería de iconos personalizados para proyectos web y Godot</p>
    </header>

    <div class="row justify-content-center mb-5">
        <div class="col-md-6">
            <input type="text" id="iconSearch" class="form-control form-control-lg" placeholder="Buscar icono por nombre...">
        </div>
    </div>

    <div id="iconGrid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 g-4">
        </div>
</div>

<script>
    // Lista de IDs sincronizada con tu sprites.svg
    const icons = [
        'icon-arrowleft', 'icon-buymeacofee', 'icon-calendar', 'icon-copyright', 
        'icon-danger', 'icon-gift', 'icon-heart', 'icon-heartsmile', 'icon-search',
        'social-amazon', 'social-bluesky', 'social-buymeacoffee', 'social-cara',
        'social-codepen', 'social-discord', 'social-email', 'social-github',
        'social-googleplay', 'social-linkedin', 'social-patreon', 'social-paypal',
        'social-pinterest', 'social-reddit', 'social-telegram', 'social-tiktok',
        'social-vgen', 'social-webtoon', 'social-youtube'
    ];

    const grid = document.getElementById('iconGrid');
    const search = document.getElementById('iconSearch');

    // Función para renderizar los iconos en pantalla
    function displayIcons(filter = '') {
        grid.innerHTML = '';
        
        const filteredIcons = icons.filter(id => id.toLowerCase().includes(filter.toLowerCase()));

        filteredIcons.forEach(id => {
            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = `
                <div class="icon-card p-3 text-center h-100" onclick="copyToClipboard('${id}')">
                    <svg class="cd-icon mb-2">
                        <use href="sprites.svg#${id}"></use>
                    </svg>
                    <div class="icon-name text-truncate" title="${id}">${id}</div>
                </div>
            `;
            grid.appendChild(col);
        });
    }

    // Copiar ID al portapapeles para usar con la etiqueta <i> en Blogger
    function copyToClipboard(id) {
        // Formateamos para que copies directamente la clase si quieres
        const classFormat = `cd-${id.replace('icon-', '').replace('social-', '')}`;
        navigator.clipboard.writeText(classFormat);
        
        // Feedback visual simple
        const toast = document.createElement('div');
        toast.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#e91e63; color:white; padding:10px 20px; border-radius:20px; z-index:1000;";
        toast.innerText = `Clase copiada: ${classFormat}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Evento de búsqueda en tiempo real
    search.addEventListener('input', (e) => displayIcons(e.target.value));

    // Carga inicial de la galería
    displayIcons();
</script>

<footer class="py-5 text-center text-muted">
    <small>&copy; 2026 Cutydina Icons Library</small>
</footer>

</body>
</html>
